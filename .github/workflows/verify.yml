name: verify

on:
  push:
  pull_request:

jobs:
  python-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-transformers.txt
          pip install datasets peft accelerate

      - name: Smoke tests
        run: |
          python -m unittest tests.test_deepthinkingflow_smoke

      - name: Project verify
        run: |
          python scripts/verify_deepthinkingflow_project.py --skip-tests --output /tmp/dtf-verify.json

      - name: Project preflight
        run: |
          python scripts/preflight_deepthinkingflow_project.py > /tmp/dtf-preflight.json

      - name: Release manifest
        run: |
          python scripts/build_release_manifest.py --verify-report /tmp/dtf-verify.json --output /tmp/dtf-release-manifest.json

      - name: Tiny smoke release lane
        run: |
          python scripts/run_tiny_smoke_release_lane.py
